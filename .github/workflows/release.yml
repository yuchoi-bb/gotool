name: release

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create"
        default: "v0.9.0"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Build
        env:
          RELEASE_TAG: ${{ inputs.tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || 'v0.9.0' }}
        run: go build -trimpath -ldflags "-s -w -H windowsgui -X main.version=$env:RELEASE_TAG" -o gotool.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gotool
          path: gotool.exe

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || 'v0.9.0' }}
          files: gotool.exe
